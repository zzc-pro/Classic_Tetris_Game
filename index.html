<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  .game-container {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  canvas {
    border: 2px solid #444;
  }
  .info-panel {
    color: #ccc;
    padding: 10px;
  }
  .info-panel h2 { font-size: 18px; margin-bottom: 10px; }
  .info-panel p { font-size: 14px; margin: 4px 0; }
  .info-panel .label { color: #888; }
  .info-panel .value { color: #0f0; font-size: 20px; }
  .key-hints {
    margin-top: 16px;
    font-size: 12px;
    color: #666;
    line-height: 1.6;
  }
  .game-over-text {
    color: #f44;
    font-size: 18px;
    margin-top: 10px;
    display: none;
  }
</style>
</head>
<body>

<div class="game-container">
  <canvas id="board"></canvas>
  <div class="info-panel">
    <h2>TETRIS</h2>
    <p class="label">Score</p>
    <p class="value" id="score">0</p>
    <p class="label">Lines</p>
    <p class="value" id="lines">0</p>
    <p class="label">Level</p>
    <p class="value" id="level">1</p>
    <p class="game-over-text" id="gameOver">GAME OVER<br>Press R to restart</p>
    <div class="key-hints">
      ← →  move<br>
      ↑    rotate<br>
      ↓    soft drop<br>
      Space hard drop<br>
      R    restart
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────
const COLS = 10;
const ROWS = 20;
const BLOCK = 30;           // pixel size of each cell
const BG_COLOR = '#1a1a1a';
const GRID_COLOR = '#222';

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
canvas.width = COLS * BLOCK;
canvas.height = ROWS * BLOCK;

// ── Piece definitions ──────────────────────────────────
// Each piece is a 2D array.  Rotation is kept as 4 states for simplicity.
const PIECES = [
  // I
  { shape: [[1,1,1,1]], color: '#0ff' },
  // O
  { shape: [[1,1],[1,1]], color: '#ff0' },
  // T
  { shape: [[0,1,0],[1,1,1]], color: '#a0f' },
  // S
  { shape: [[0,1,1],[1,1,0]], color: '#0f0' },
  // Z
  { shape: [[1,1,0],[0,1,1]], color: '#f00' },
  // J
  { shape: [[1,0,0],[1,1,1]], color: '#08f' },
  // L
  { shape: [[0,0,1],[1,1,1]], color: '#f80' },
];

// ── Game state ─────────────────────────────────────────
let board = [];           // 2D grid, 0 = empty, otherwise a color string
let current = null;       // { shape, color, x, y }
let nextPiece = null;
let score = 0;
let lines = 0;
let level = 1;
let gameOver = false;
let started = false;        // start-menu flag
let dropInterval = 800;   // ms between auto-drops
let lastDrop = 0;

// Clear animation state
let clearingRows = [];    // rows currently being animated for clearing
let clearAnimStart = 0;   // timestamp when animation started
const CLEAR_ANIM_DURATION = 300; // ms
let bonusText = null;     // bonus popup text & position
let bonusTextStart = 0;

// ── DOM elements ───────────────────────────────────────
const scoreEl = document.getElementById('score');
const linesEl = document.getElementById('lines');
const levelEl = document.getElementById('level');
const gameOverEl = document.getElementById('gameOver');

// ── Board helpers ──────────────────────────────────────
function createBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board.push(new Array(COLS).fill(0));
  }
}

// ── Piece helpers ──────────────────────────────────────
function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return {
    shape: p.shape.map(row => [...row]),
    color: p.color,
    x: Math.floor((COLS - p.shape[0].length) / 2),
    y: 0,
  };
}

// Rotate piece clockwise
function rotateCW(shape) {
  const rows = shape.length;
  const cols = shape[0].length;
  const rotated = [];
  for (let c = 0; c < cols; c++) {
    rotated.push([]);
    for (let r = rows - 1; r >= 0; r--) {
      rotated[c].push(shape[r][c]);
    }
  }
  return rotated;
}

// ── Collision detection ────────────────────────────────
function collides(shape, px, py) {
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const bx = px + c;
      const by = py + r;
      if (bx < 0 || bx >= COLS || by >= ROWS) return true;
      if (by >= 0 && board[by][bx]) return true;
    }
  }
  return false;
}

// ── Place piece onto the board ─────────────────────────
function lockPiece() {
  const { shape, color, x, y } = current;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const by = y + r;
      const bx = x + c;
      if (by < 0) {
        triggerGameOver();
        return;
      }
      board[by][bx] = color;
    }
  }
  current = null;
  clearLines();
  // If no lines to clear, spawn immediately
  if (clearingRows.length === 0) {
    spawnPiece();
  }
}

// ── Clear completed lines (with animation) ──────────────
function clearLines() {
  const fullRows = [];
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(cell => cell !== 0)) {
      fullRows.push(r);
    }
  }
  if (fullRows.length > 0) {
    // Start flash animation, defer actual removal
    clearingRows = fullRows;
    clearAnimStart = performance.now();
    // Show bonus text for multi-line clears
    const labels = [null, '', 'Double!', 'Triple!', 'Tetris!'];
    const label = labels[fullRows.length] || 'MEGA!';
    if (label) {
      bonusText = { text: label, count: fullRows.length };
      bonusTextStart = performance.now();
    }
  }
}

// Called after animation finishes — actually removes rows and scores
function finishClear() {
  const count = clearingRows.length;
  // Remove rows (they are already in descending order)
  for (const r of clearingRows) {
    board.splice(r, 1);
  }
  for (let i = 0; i < count; i++) {
    board.unshift(new Array(COLS).fill(0));
  }
  clearingRows = [];

  // Base points per line count: 0, 100, 300, 500, 800
  const points = [0, 100, 300, 500, 800];
  score += points[count] * level;
  lines += count;
  level = Math.floor(lines / 10) + 1;
  dropInterval = Math.max(50, 800 - (level - 1) * 70);
  updateUI();
  spawnPiece();
}

// ── Spawn a new piece ──────────────────────────────────
function spawnPiece() {
  if (nextPiece) {
    current = nextPiece;
  } else {
    current = randomPiece();
  }
  nextPiece = randomPiece();
  if (collides(current.shape, current.x, current.y)) {
    triggerGameOver();
  }
}

// ── Game over ──────────────────────────────────────────
function triggerGameOver() {
  gameOver = true;
  gameOverEl.style.display = 'block';
}

// ── Movement functions ─────────────────────────────────
function moveLeft() {
  if (gameOver || !current) return;
  if (!collides(current.shape, current.x - 1, current.y)) {
    current.x--;
  }
}

function moveRight() {
  if (gameOver || !current) return;
  if (!collides(current.shape, current.x + 1, current.y)) {
    current.x++;
  }
}

function softDrop() {
  if (gameOver || !current) return;
  if (!collides(current.shape, current.x, current.y + 1)) {
    current.y++;
    score += 1;
    updateUI();
  }
}

function hardDrop() {
  if (gameOver || !current) return;
  while (!collides(current.shape, current.x, current.y + 1)) {
    current.y++;
    score += 2;
  }
  updateUI();
  lockPiece();
}

function rotate() {
  if (gameOver || !current) return;
  const rotated = rotateCW(current.shape);
  // Simple wall kick: try original position, then nudge left/right
  if (!collides(rotated, current.x, current.y)) {
    current.shape = rotated;
  } else if (!collides(rotated, current.x - 1, current.y)) {
    current.shape = rotated;
    current.x--;
  } else if (!collides(rotated, current.x + 1, current.y)) {
    current.shape = rotated;
    current.x++;
  }
  // else rotation fails, do nothing
}

function restart() {
  createBoard();
  score = 0;
  lines = 0;
  level = 1;
  dropInterval = 800;
  gameOver = false;
  gameOverEl.style.display = 'none';
  current = null;
  nextPiece = null;
  clearingRows = [];
  bonusText = null;
  spawnPiece();
  updateUI();
}

function startGame() {
  started = true;
  restart();
}

function updateUI() {
  scoreEl.textContent = score;
  linesEl.textContent = lines;
  levelEl.textContent = level;
}

// ── Drawing ────────────────────────────────────────────
function draw(now) {
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw grid lines
  ctx.strokeStyle = GRID_COLOR;
  ctx.lineWidth = 0.5;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.strokeRect(c * BLOCK, r * BLOCK, BLOCK, BLOCK);
    }
  }

  // Draw locked cells (skip rows being cleared)
  const clearingSet = new Set(clearingRows);
  for (let r = 0; r < ROWS; r++) {
    if (clearingSet.has(r)) continue;
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) {
        drawBlock(c, r, board[r][c]);
      }
    }
  }

  // Draw clearing rows with flash effect
  for (const r of clearingRows) {
    const progress = (now - clearAnimStart) / CLEAR_ANIM_DURATION;
    // Blink: alternate between white and original color faster as it ends
    const blink = Math.sin(progress * Math.PI * 6) > 0;
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) {
        if (blink) {
          drawBlock(c, r, '#fff');
        } else {
          drawBlock(c, r, board[r][c]);
        }
      }
    }
  }

  // Draw ghost piece (hard drop preview)
  if (current && !gameOver && clearingRows.length === 0) {
    let ghostY = current.y;
    while (!collides(current.shape, current.x, ghostY + 1)) ghostY++;
    if (ghostY !== current.y) {
      for (let r = 0; r < current.shape.length; r++) {
        for (let c = 0; c < current.shape[r].length; c++) {
          if (current.shape[r][c]) {
            drawBlockGhost(current.x + c, ghostY + r, current.color);
          }
        }
      }
    }
  }

  // Draw current piece
  if (current && !gameOver && clearingRows.length === 0) {
    for (let r = 0; r < current.shape.length; r++) {
      for (let c = 0; c < current.shape[r].length; c++) {
        if (current.shape[r][c]) {
          drawBlock(current.x + c, current.y + r, current.color);
        }
      }
    }
  }

  // Draw bonus text popup
  if (bonusText && now - bonusTextStart < 1000) {
    const alpha = 1 - (now - bonusTextStart) / 1000;
    const yOff = -40 - (now - bonusTextStart) * 0.05; // float upward
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 22px monospace';
    ctx.fillStyle = '#ff0';
    ctx.textAlign = 'center';
    ctx.fillText(bonusText.text, canvas.width / 2, canvas.height / 2 + yOff);
    ctx.restore();
  } else if (bonusText && now - bonusTextStart >= 1000) {
    bonusText = null;
  }

  // Start-menu overlay
  if (!started) drawMenu(now);
}

function drawMenu(now) {
  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Title
  const title = 'TETRIS';
  const colors = ['#f00', '#f80', '#ff0', '#0f0', '#0ff', '#08f', '#a0f'];
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  const totalW = title.length * 22;
  const startX = canvas.width / 2 - totalW / 2 + 11;
  for (let i = 0; i < title.length; i++) {
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillText(title[i], startX + i * 22, canvas.height / 2 - 40);
  }

  // Prompt
  const pulse = Math.sin(now * 0.004) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('Press ENTER to start', canvas.width / 2, canvas.height / 2 + 20);
  ctx.globalAlpha = 1;

  // Controls
  ctx.font = '11px monospace';
  ctx.fillStyle = '#888';
  const hints = [
    '← →  Move',
    '↑    Rotate',
    '↓    Soft drop',
    'Space  Hard drop',
    'R      Restart',
  ];
  hints.forEach((h, i) => {
    ctx.fillText(h, canvas.width / 2, canvas.height / 2 + 52 + i * 16);
  });
}

function drawBlock(x, y, color) {
  const px = x * BLOCK;
  const py = y * BLOCK;
  const s = 2; // shading inset
  ctx.fillStyle = color;
  ctx.fillRect(px + 1, py + 1, BLOCK - 2, BLOCK - 2);
  // Highlight (top-left)
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(px + 1, py + 1, BLOCK - 2, s);
  ctx.fillRect(px + 1, py + 1, s, BLOCK - 2);
  // Shadow (bottom-right)
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px + 1, py + BLOCK - 2 - s, BLOCK - 2, s);
  ctx.fillRect(px + BLOCK - 2 - s, py + 1, s, BLOCK - 2);
}

function drawBlockGhost(x, y, color) {
  const px = x * BLOCK;
  const py = y * BLOCK;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.4;
  ctx.strokeRect(px + 2, py + 2, BLOCK - 4, BLOCK - 4);
  ctx.globalAlpha = 1;
}

// ── Game loop ──────────────────────────────────────────
function tick(now) {
  const clearing = clearingRows.length > 0;

  if (!gameOver && current && !clearing) {
    if (now - lastDrop > dropInterval) {
      if (!collides(current.shape, current.x, current.y + 1)) {
        current.y++;
      } else {
        lockPiece();
      }
      lastDrop = now;
    }
  }

  // Handle clear animation
  if (clearing && now - clearAnimStart >= CLEAR_ANIM_DURATION) {
    finishClear();
  }

  draw(now);
  requestAnimationFrame(tick);
}

// ── Keyboard input ─────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (!started) { startGame(); return; }
  }
  if (e.key === 'r' || e.key === 'R') { restart(); return; }
  if (gameOver) return;

  switch (e.key) {
    case 'ArrowLeft':  moveLeft(); break;
    case 'ArrowRight': moveRight(); break;
    case 'ArrowDown':  softDrop(); break;
    case 'ArrowUp':    rotate(); break;
    case ' ':          hardDrop(); e.preventDefault(); break; // space
  }
  lastDrop = performance.now(); // reset drop timer on any key
});

// ── Start ──────────────────────────────────────────────
createBoard();
requestAnimationFrame(tick);
</script>
</body>
</html>
